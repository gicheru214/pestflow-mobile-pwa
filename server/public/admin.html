<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PestFlow — Quiz Admin</title>
<style>
  :root {
    --bg:#0a1410; --panel:#0f1f14; --surface:#16291c; --border:#234a31;
    --green:#40916c; --green-bright:#6de040; --green-soft:#a8d890;
    --text:#e8f5e9; --sub:#8fb99a; --dim:#4a7c59;
    --gold:#f9c74f; --red:#e63946;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
    background:#050a08;color:var(--text);min-height:100vh;
  }
  header{
    position:sticky;top:0;z-index:5;background:#050a08;border-bottom:1px solid #14241a;
    padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
  }
  .brand{font-size:18px;font-weight:800;color:var(--green-bright);letter-spacing:-.3px}
  .brand-sub{font-size:11px;color:var(--dim);font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-left:6px}
  .stats{display:flex;gap:18px;flex-wrap:wrap}
  .stat{
    background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:10px 14px;min-width:120px;
  }
  .stat .lbl{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .stat .val{font-size:20px;font-weight:800;color:var(--green-bright);margin-top:2px}
  .stat.gold .val{color:var(--gold)}
  .controls{display:flex;gap:10px;align-items:center}
  .controls input{
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    color:var(--text);padding:8px 12px;font-size:13px;font-family:inherit;width:240px;
  }
  .controls button{
    background:var(--green);border:1px solid var(--green-bright);
    color:#0a1410;font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;
    padding:8px 14px;border-radius:8px;cursor:pointer;font-family:inherit;
  }
  .controls button.ghost{background:transparent;color:var(--green-soft);border-color:var(--border)}
  main{max-width:1320px;margin:0 auto;padding:22px}
  .empty{
    text-align:center;padding:80px 20px;color:var(--sub);
    border:1px dashed var(--border);border-radius:14px;background:var(--panel);
  }
  .empty h2{color:var(--green-bright);font-size:18px;margin-bottom:8px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  th,td{text-align:left;padding:12px 14px;font-size:13px;border-bottom:1px solid #14241a;vertical-align:top}
  th{background:#0c1a11;color:var(--dim);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;position:sticky;top:0}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#0d1d13;cursor:pointer}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.04em}
  .pill.green{background:#14361f;color:var(--green-bright);border:1px solid var(--green)}
  .pill.gold{background:#2d2810;color:var(--gold);border:1px solid var(--gold)}
  .pill.red{background:#3a1414;color:#ff8a8a;border:1px solid var(--red)}
  .money{color:var(--green-bright);font-weight:700;font-variant-numeric:tabular-nums}
  .muted{color:var(--sub)}
  .dim{color:var(--dim);font-size:11px}
  /* Drawer */
  .drawer-bg{position:fixed;inset:0;background:rgba(2,8,5,.7);display:none;z-index:80}
  .drawer-bg.show{display:block}
  .drawer{
    position:fixed;top:0;right:0;bottom:0;width:min(560px,100%);background:var(--panel);
    border-left:1px solid var(--border);padding:22px 24px;overflow-y:auto;z-index:81;
    transform:translateX(100%);transition:transform .22s ease;
  }
  .drawer.show{transform:translateX(0)}
  .drawer h3{font-size:18px;color:var(--green-bright);margin-bottom:6px}
  .drawer .sub{color:var(--sub);font-size:12px;margin-bottom:14px}
  .drawer section{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #14241a}
  .drawer section:last-child{border:none}
  .drawer .kv{display:grid;grid-template-columns:120px 1fr;gap:6px 14px;font-size:13px}
  .drawer .kv .k{color:var(--dim);font-weight:600}
  .drawer pre{background:#0a1612;border:1px solid #14241a;padding:10px;border-radius:8px;font-size:11px;overflow-x:auto;color:var(--green-soft);max-height:280px}
  .drawer .x{
    position:absolute;top:14px;right:14px;background:transparent;border:1px solid var(--border);
    color:var(--sub);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;
  }
  .auth{
    max-width:420px;margin:120px auto;background:var(--panel);border:1px solid var(--border);
    border-radius:14px;padding:30px;
  }
  .auth h1{color:var(--green-bright);font-size:20px;margin-bottom:6px}
  .auth p{color:var(--sub);font-size:13px;margin-bottom:18px}
  .auth input{
    width:100%;background:#0a1612;border:1px solid var(--border);border-radius:8px;
    color:var(--text);padding:10px 12px;font-size:14px;font-family:inherit;margin-bottom:12px;
  }
  .auth button{
    width:100%;background:var(--green);border:1px solid var(--green-bright);color:#0a1410;
    font-weight:800;font-size:13px;letter-spacing:.06em;text-transform:uppercase;
    padding:11px;border-radius:8px;cursor:pointer;font-family:inherit;
  }
  .auth .err{color:#ff8a8a;font-size:12px;margin-top:8px;display:none}
  .auth .err.show{display:block}
</style>
</head>
<body>

<div id="loginScreen" class="auth" style="display:none">
  <h1>Quiz Admin</h1>
  <p>Enter the admin token to view submissions.</p>
  <input id="tokenInput" type="password" placeholder="ADMIN_TOKEN" autocomplete="off">
  <button onclick="login()">Unlock</button>
  <div id="loginErr" class="err">Invalid token.</div>
</div>

<div id="adminApp" style="display:none">
  <header>
    <div>
      <span class="brand">PestFlow</span><span class="brand-sub">Quiz Admin</span>
    </div>
    <div class="stats">
      <div class="stat"><div class="lbl">Submissions</div><div class="val" id="statCount">—</div></div>
      <div class="stat"><div class="lbl">Avg score</div><div class="val" id="statAvgScore">—</div></div>
      <div class="stat gold"><div class="lbl">Avg revenue gap</div><div class="val" id="statAvgRev">—</div></div>
      <div class="stat"><div class="lbl">Last 24h</div><div class="val" id="statRecent">—</div></div>
    </div>
    <div class="controls">
      <input id="search" placeholder="Filter by name/email/business…" oninput="renderTable()">
      <button onclick="refresh()">Refresh</button>
      <button class="ghost" onclick="exportCsv()">CSV</button>
      <button class="ghost" onclick="logout()">Sign out</button>
    </div>
  </header>

  <main>
    <div id="tableWrap"></div>
  </main>
</div>

<div id="drawerBg" class="drawer-bg" onclick="closeDrawer()"></div>
<aside id="drawer" class="drawer">
  <button class="x" onclick="closeDrawer()">×</button>
  <div id="drawerBody"></div>
</aside>

<script>
const TOKEN_KEY = 'pestflow.admin.token';
let SUBMISSIONS = [];

function getToken(){ return sessionStorage.getItem(TOKEN_KEY) || ''; }
function setToken(t){ sessionStorage.setItem(TOKEN_KEY, t); }
function clearToken(){ sessionStorage.removeItem(TOKEN_KEY); }

function fmtMoney(n){
  if (!n) return '$0';
  if (n >= 1000) return '$' + Math.round(n/1000) + 'K';
  return '$' + n;
}
function fmtDate(iso){
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
}
function escHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function fetchSubmissions(){
  const r = await fetch('/api/quiz-submissions', {
    headers: { 'X-Admin-Token': getToken() }
  });
  if (r.status === 401) throw new Error('unauthorized');
  if (!r.ok) throw new Error('fetch failed: ' + r.status);
  const data = await r.json();
  return data.submissions || [];
}

async function refresh(){
  try {
    SUBMISSIONS = await fetchSubmissions();
    renderStats();
    renderTable();
  } catch (e) {
    if (String(e.message) === 'unauthorized') { clearToken(); showLogin(); }
    else alert('Could not load submissions: ' + e.message);
  }
}

function renderStats(){
  const n = SUBMISSIONS.length;
  document.getElementById('statCount').textContent = n;
  if (!n) {
    document.getElementById('statAvgScore').textContent = '—';
    document.getElementById('statAvgRev').textContent   = '—';
    document.getElementById('statRecent').textContent   = '0';
    return;
  }
  const avgScore = Math.round(SUBMISSIONS.reduce((s,r)=>s+(r.score||0),0)/n);
  const avgRev   = Math.round(SUBMISSIONS.reduce((s,r)=>s+(r.revenue||0),0)/n);
  const cutoff   = Date.now() - 24*60*60*1000;
  const recent   = SUBMISSIONS.filter(r => new Date(r.receivedAt).getTime() > cutoff).length;
  document.getElementById('statAvgScore').textContent = avgScore + '/100';
  document.getElementById('statAvgRev').textContent   = fmtMoney(avgRev);
  document.getElementById('statRecent').textContent   = recent;
}

function renderTable(){
  const q = (document.getElementById('search').value || '').trim().toLowerCase();
  const rows = SUBMISSIONS.filter(r => {
    if (!q) return true;
    const c = r.contact || {};
    return [c.name, c.email, c.phone, c.business].some(v => v && String(v).toLowerCase().includes(q));
  });
  const wrap = document.getElementById('tableWrap');
  if (!rows.length) {
    wrap.innerHTML = `<div class="empty"><h2>${SUBMISSIONS.length ? 'No matches' : 'No submissions yet'}</h2><p>${SUBMISSIONS.length ? 'Try a different search.' : 'Quiz submissions will appear here as soon as the wireframe POSTs to /api/quiz-submissions.'}</p></div>`;
    return;
  }
  wrap.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>When</th><th>Contact</th><th>Score</th><th>Revenue gap</th><th>Retention / Eff / Leads</th><th>Source</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map((r,i) => {
          const c = r.contact || {};
          const b = r.breakdown || {};
          const scorePill = (r.score >= 75) ? 'green' : (r.score >= 50) ? 'gold' : 'red';
          return `<tr onclick="openDrawer(${SUBMISSIONS.indexOf(r)})">
            <td><div>${escHtml(fmtDate(r.receivedAt))}</div><div class="dim">${escHtml(r.id?.slice(0,8) || '')}</div></td>
            <td>
              <div><b>${escHtml(c.name || c.email || '(anonymous)')}</b></div>
              <div class="muted">${escHtml(c.business || '')}</div>
              <div class="dim">${escHtml(c.email || '')}${c.phone ? ' · ' + escHtml(c.phone) : ''}</div>
            </td>
            <td><span class="pill ${scorePill}">${r.score}/100</span></td>
            <td class="money">${fmtMoney(r.revenue)}</td>
            <td class="muted">${b.retention ?? '—'} / ${b.efficiency ?? '—'} / ${b.leads ?? '—'}</td>
            <td class="dim">${escHtml((r.referer || '').replace(/^https?:\/\//,'').slice(0,40))}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function openDrawer(idx){
  const r = SUBMISSIONS[idx]; if (!r) return;
  const c = r.contact || {}, b = r.breakdown || {};
  document.getElementById('drawerBody').innerHTML = `
    <h3>${escHtml(c.name || c.email || 'Anonymous submission')}</h3>
    <div class="sub">${escHtml(fmtDate(r.receivedAt))} · ${escHtml(r.id || '')}</div>
    <section>
      <div class="kv">
        <div class="k">Score</div><div><span class="pill ${r.score>=75?'green':r.score>=50?'gold':'red'}">${r.score}/100</span></div>
        <div class="k">Revenue gap</div><div class="money">${fmtMoney(r.revenue)}</div>
        <div class="k">Retention</div><div>${b.retention ?? '—'}</div>
        <div class="k">Efficiency</div><div>${b.efficiency ?? '—'}</div>
        <div class="k">Leads</div><div>${b.leads ?? '—'}</div>
        <div class="k">Duration</div><div>${r.durationMs ? Math.round(r.durationMs/1000) + 's' : '—'}</div>
      </div>
    </section>
    <section>
      <div class="kv">
        <div class="k">Name</div><div>${escHtml(c.name || '—')}</div>
        <div class="k">Email</div><div>${escHtml(c.email || '—')}</div>
        <div class="k">Phone</div><div>${escHtml(c.phone || '—')}</div>
        <div class="k">Business</div><div>${escHtml(c.business || '—')}</div>
        <div class="k">Referer</div><div class="dim">${escHtml(r.referer || '—')}</div>
        <div class="k">User agent</div><div class="dim">${escHtml(r.userAgent || '—')}</div>
      </div>
    </section>
    <section>
      <div class="k" style="color:var(--dim);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">Answers</div>
      <pre>${escHtml(JSON.stringify(r.answers, null, 2))}</pre>
    </section>`;
  document.getElementById('drawer').classList.add('show');
  document.getElementById('drawerBg').classList.add('show');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('show');
  document.getElementById('drawerBg').classList.remove('show');
}

function exportCsv(){
  if (!SUBMISSIONS.length) return;
  const rows = [['receivedAt','id','name','email','phone','business','score','revenue','retention','efficiency','leads','referer']];
  for (const r of SUBMISSIONS) {
    const c = r.contact || {}, b = r.breakdown || {};
    rows.push([
      r.receivedAt, r.id, c.name||'', c.email||'', c.phone||'', c.business||'',
      r.score||'', r.revenue||'', b.retention||'', b.efficiency||'', b.leads||'', r.referer||''
    ]);
  }
  const csv = rows.map(row => row.map(v => {
    const s = String(v ?? '');
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pestflow-quiz-submissions-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function showLogin(){
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('adminApp').style.display = 'none';
  setTimeout(() => document.getElementById('tokenInput').focus(), 30);
}
function showApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminApp').style.display = 'block';
}
async function login(){
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return;
  setToken(t);
  try { await fetchSubmissions(); showApp(); refresh(); }
  catch (e) {
    clearToken();
    document.getElementById('loginErr').classList.add('show');
  }
}
function logout(){ clearToken(); SUBMISSIONS = []; showLogin(); }

document.getElementById('tokenInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

// boot
(async () => {
  if (!getToken()) return showLogin();
  try { await fetchSubmissions(); showApp(); refresh(); }
  catch { showLogin(); }
})();
</script>

</body>
</html>
